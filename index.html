<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Yugo Puzzle" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Yugo Puzzle (Web)</title>
  <link rel="stylesheet" href="css/style.css?v=6" />
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <button type="button" id="btn-menu" class="icon-btn" aria-label="レベル選択">☰</button>
      <span id="level-label" class="level-label">Level 1</span>
      <div class="toolbar-right">
        <button type="button" id="btn-undo" class="text-btn">戻す</button>
        <button type="button" id="btn-reset" class="text-btn">リセット</button>
      </div>
    </header>

    <main id="stage-wrap">
      <div id="stage-fit">
        <div id="stage-scaler">
          <div id="map" aria-label="パズル盤面"></div>
          <p id="wip-overlay" class="wip-overlay" hidden>修正中</p>
        </div>
      </div>
    </main>

    <footer class="toolbar footer-bar">
      <button type="button" id="btn-prev" class="text-btn">◀</button>
      <button type="button" id="btn-grid" class="text-btn btn-grid-toggle" aria-pressed="false">
        <span class="btn-grid-label">マス目</span>
        <span id="btn-grid-state" class="btn-grid-state">OFF</span>
      </button>
      <button type="button" id="btn-settings" class="text-btn">設定</button>
      <button type="button" id="btn-next" class="text-btn">▶</button>
    </footer>
  </div>

  <dialog id="menu-dialog">
    <h2>レベル選択</h2>
    <div id="level-grid" class="level-grid"></div>
    <form method="dialog">
      <button type="submit" class="text-btn">閉じる</button>
    </form>
  </dialog>

  <dialog id="settings-dialog">
    <h2>設定</h2>
    <label class="setting-row">
      <input type="checkbox" id="opt-dark" checked />
      ダークモード
    </label>
    <label class="setting-row">
      <input type="checkbox" id="opt-faces" />
      ゼリーの顔を表示
    </label>
    <label class="setting-row">
      <input type="checkbox" id="opt-grid" />
      マス目（1マスごとのグリッド線）
    </label>
    <form method="dialog">
      <button type="submit" class="text-btn">閉じる</button>
    </form>
  </dialog>

  <div id="clear-fx" aria-hidden="true"></div>

  <dialog id="clear-dialog" class="clear-dialog">
    <div class="clear-dialog-body">
      <p class="clear-title">クリア！</p>
      <p class="clear-level">LEVEL <span id="clear-level-num">1</span></p>
      <form method="dialog" class="clear-actions">
        <button type="submit" value="next" class="text-btn primary">次のレベル</button>
        <button type="submit" value="stay" class="text-btn">このまま</button>
      </form>
    </div>
  </dialog>

  <script type="module" src="js/app.js?v=7"></script>
</body>
</html>
